<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ezequiel Carracedo">
    <link rel="stylesheet" href="./css/styles.css">
    <title>GESTOR DE INCIDENCIAS</title>
</head>

<body>
    <div id="contGeneral">
        <h2>MENU</h2>
        <div id="contMenu">
            <button id="botonMenuAltaIncidencia">ALTA INCIDENCIA</button>
            <button id="botonMenuAltaUser">ALTA USUARIO</button>
            <button id="botonMenuListaIncidencias">LISTA INCIDENCIAS</button>
            <button id="botonMenuListaUsers">LISTA USUARIOS</button>
            <button id="botonMenuBuscarIncidencia">BUSCAR INCIDENCIA</button>
            <button id="modificarIncidencia">MODIFICAR INCIDENCIA</button>

        </div>

    </div>
    <div id="contSeccions">

        <div id="formIncidencia" class="seccion" style="display: none;">
            <h2>CREAR INCIDENCIA</h2>
            <form action="">
                <label for="descripcio">DESCRIPCION:</label><br>
                <input type="text" id="inputDescripcio" name="descripcio"><br>
                <label for="users">ASIGNA UN USUARIO:</label>
                <select id="selectUsers">

                </select>

                <input type="button" value="CREAR" id="crearIncidencia">
            </form>
        </div>

        <div id="formUser" class="seccion" style="display: none;">
            <h2>ALTA USUARIO</h2>
            <form action="">
                <label for="nombre">NOMBRE:</label><br>
                <input type="text" id="nombre" name="name"><br>
                <label for="correo">CORREO:</label><br>
                <input type="text" id="correo" name="email"><br>

                <input type="button" value="CREAR" id="">
            </form>
        </div>

        <div id="tablaIncidencias-container" class="seccion" style="display: none;">
            <table border="1" id="tablaIncidencias">
                <tr>
                    <th>ID_INCIDENCIA</th>
                    <th>DESCRIPCION</th>
                    <th>ESTADO</th>
                    <th>ID_USUARIO</th>
                    <th>NOMBRE_USUARIO</th>
                    <th>EMAIL</th>
                </tr>
            </table>
        </div>

        <div id="tablaUsers-container" class="seccion" style="display: none;">
            <table border="1" id="tablaUsers">
                <tr>
                    <th>ID</th>
                    <th>NOMBRE</th>
                    <th>EMAIL</th>
                    <th>INCIDENCIAS ABIERTAS</th>
                </tr>
            </table>
        </div>
        <div id="seccionBuscarIncidencia" class="seccion" style="display: none;">
            <form action="">
                <label for="id">ID:</label><br>
                <input type="text" id="idIncidencia" name="id"><br>
            
                <input type="button" value="BUSCAR" id="botonBuscarIncidencia">
            </form>
        </div>


    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
